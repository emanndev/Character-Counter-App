<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="css/style.css">
  <title>Character Counter</title>
</head>
<body>
  <div id="preloader">
    <div class="cube">
      <div class="face front">A B C</div>
      <div class="face back">D E F</div>
      <div class="face right">G H I</div>
      <div class="face left">J K L</div>
      <div class="face top">M N O</div>
      <div class="face bottom">P Q R</div>
    </div>
  </div>
  
  <div class="container">
    <nav class="nav">
      <img class="logo" id="logo" src="./assets/images/logo-dark-theme.svg" alt="Character Counter Logo">
      <button class="theme-toggle" id="themeToggle"  aria-label="Toggle dark/light mode">
        <img id="themeIcon" class="theme-icon" src="./assets/images/icon-sun.svg" alt="">
      </button>
    </nav>

    <header class="header slide-down">
      <h1 class="title">Analyze your text in real-time.</h1>
    </header>
 
    <main class="main-content">
      <section class="text-input-section slide-in-left ">
        <form id="textForm">
          <textarea name="text" id="textInput" placeholder="Start typing here...(or paste your text)"></textarea>
          
          <div class="options fade-in">
            <div class="option">
              <div>
                <input type="checkbox" name="excludeSpaces" id="excludeSpaces">
                <label for="excludeSpaces" class="spaces-text">Exclude Spaces</label> 
              </div>
               <div>
                <input type="checkbox" name="charLimit" id="charLimit">
                <label for="charLimit" class="char-text">Set Character Limit</label>
               </div>
             
              </div>
            <div>
             
              <p class="reading-time" id="readingTime"> Approx. reading time: &lt;0 minute</p> 
      
            </div>
            
          </div>
          
           </form>
      </section>
      
      <section class="box-section">
        <div class="box-grid">
          <div class="box-card" id="totalChars">
            <h3 id="totalCharactersText">00</h3>
            <p>Total Characters <span id="totalCharSubtext"></span></p>
          </div>
          
          <div class="box-card" id="wordsCount">
            <h3 id="wordCountText">00</h3>
            <p>Word Count</p>
          </div>
          
          <div class="box-card" id="sentencesCount">
            <h3 id="sentenceCountText">00</h3>
            <p>Sentence Count</p>
          </div>
        </div>
      </section>

      <section class="letter-density-section">
        <h2 class="density-text">Letter Density</h2>
        
        <div class="density-grid">
          <p class="progress-text">No characters found. Start typing to see letter density</p>
       
        </div>
        
      </section>
    </main>
  </div>

  <!-- <script src="js/script.js"></script> -->
  <script type="module" src="js/counters.js"></script>
  <script type="module" src="js/display.js"></script>
  <script type="module" src="js/script.js"></script>
  <script src="https://kit.fontawesome.com/ff488817c2.js" crossorigin="anonymous"></script>
</body>
</html>
